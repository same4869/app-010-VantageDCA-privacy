<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VantageDCA Privacy Policy</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; margin: 0; background: #0d1422; color: #e8eefc; }
    .wrap { max-width: 760px; margin: 56px auto; padding: 0 20px; }
    .card { background: #111b2d; border: 1px solid #22324d; border-radius: 14px; padding: 18px; }
    a { color: #7eb6ff; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .muted { color: #9eb0cf; }
  </style>
  <script>
    (function () {
      var lang = (navigator.language || "en").toLowerCase();
      var target = "en/";
      if (lang.indexOf("zh-hant") === 0 || lang.indexOf("zh-tw") === 0 || lang.indexOf("zh-hk") === 0 || lang.indexOf("zh-mo") === 0) {
        target = "zh-Hant/";
      } else if (lang.indexOf("zh") === 0) {
        target = "zh-Hans/";
      }
      window.location.replace(target);
    })();
  </script>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <p class="muted">Redirecting to your language...</p>
      <p>If not redirected, open:
        <a href="./en/">English</a> |
        <a href="./zh-Hans/">简体中文</a> |
        <a href="./zh-Hant/">繁體中文</a>
      </p>
    </div>
  </div>
</body>
</html>
